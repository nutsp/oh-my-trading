services:
  postgres-timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: omt-postgres-timescale
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oh_my_trading}
      POSTGRES_USER: ${POSTGRES_USER:-omt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omt_local_password}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_timescale_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-omt} -d ${POSTGRES_DB:-oh_my_trading}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: omt-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: omt-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-omt}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-omt_local_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_timescale_data:
  redis_data:
  rabbitmq_data:
